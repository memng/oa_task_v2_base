version: '3.8'

services:
  nginx:
    image: nginx:latest
    platform: linux/arm64
    ports:
      - "80:80"
    volumes:
      # 更改：挂载整个项目目录到 /app
      - ./backend:/var/www/html
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - php
      - mysql

  php:
    image: arm64v8/php:7.4-fpm
    platform: linux/arm64
    volumes:
      - ./backend:/var/www/html
    # 告诉 PHP-FPM 它的工作目录是 /app
    command: >
      bash -c "docker-php-ext-install mysqli pdo pdo_mysql && php-fpm"

  mysql:
    image: biarms/mysql:5     # biarms/mysql:5 → arm64v8 上对应 MySQL 5.7.30
    platform: linux/arm64
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: oa_task
    volumes:
      - /Users/mason/workspace/mysql_data:/var/lib/mysql
